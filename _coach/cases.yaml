# Каталог бизнес-кейсов для /case.
#
# В отличие от curriculum.yaml (там темы и concepts — материал для точечной
# прокачки конкретного знания), здесь — сквозные бизнес-задачи на реальных
# датасетах из content/ml_basics_course/datasets (git submodule на
# https://github.com/evgpat/ml_basics_course). Пользователю НЕ сообщается тип
# задачи (регрессия/классификация), метрика или модель — это часть того,
# что он должен решить сам. `evaluator_notes` — это внутренний чек-лист для
# оценки решения, пользователю не показывается.

cases:
  - id: real-estate-pricing
    title: "Оценка стоимости квартир для агентства недвижимости"
    difficulty: beginner
    related_topics: [linear-regression-gd, eda-and-pipeline]
    dataset:
      - "content/ml_basics_course/datasets/flats.csv"
    brief: |
      Агентство недвижимости хочет автоматически показывать клиенту
      ориентировочную цену квартиры сразу при первом обращении, чтобы не
      дёргать оценщика на каждый звонок. Если система сильно завышает цену —
      клиент уходит к конкурентам. Если сильно занижает — агентство теряет
      на комиссии. Данные о квартирах: flats.csv. Постройте решение и
      обоснуйте, почему ему можно доверять.
    evaluator_notes: |
      Регрессия. Ключевая проверка: заметил ли пользователь асимметрию
      издержек (завышение vs занижение цены) и выбрал ли метрику/подход,
      которые её отражают (не просто голый MSE без интерпретации в рублях/
      процентах). Смотреть на адекватность train/test, обработку выбросов
      (аномально дорогие/дешёвые квартиры), интерпретируемость результата
      для нетехнического стейкхолдера (агентства).

  - id: loan-approval
    title: "Автоматическая сортировка заявок на кредит"
    difficulty: intermediate
    related_topics: [classification-metrics, class-imbalance, cross-validation-hyperparams]
    dataset:
      - "content/ml_basics_course/datasets/Indian_Banks_Loan_Dataset_(train_small).csv"
      - "content/ml_basics_course/datasets/Indian_Banks_Loan_Dataset_(test_small).csv"
    brief: |
      Банк хочет автоматически сортировать заявки на кредит на "одобрить" и
      "отклонить" по историческим данным о заявках (файлы приложены).
      Ошибочно одобренный плохой заёмщик обходится банку в разы дороже, чем
      ошибочно отклонённый хороший — но полностью отказаться от одобрений
      тоже нельзя, бизнес должен на чём-то зарабатывать. Постройте решение
      и обоснуйте, на какой компромисс между этими ошибками вы пошли и
      почему.
    evaluator_notes: |
      Бинарная классификация, целевая переменная — Disbursed. Ключевая
      проверка: выбрал ли пользователь порог/метрику, отражающую названную
      асимметрию издержек (precision важнее recall для класса "одобрить"),
      а не accuracy по умолчанию. Данные уже one-hot закодированы — хорошая
      проверка, заметит ли пользователь дисбаланс классов в целевой
      переменной и как с ним справится.

  - id: wine-quality-control
    title: "Контроль качества вина по химическому анализу"
    difficulty: intermediate
    related_topics: [linear-regression-gd, classification-metrics]
    dataset:
      - "content/ml_basics_course/datasets/wineQualityReds.csv"
    brief: |
      Винодельня хочет по результатам химического анализа партии вина (ещё
      до дегустации) предсказывать итоговую оценку качества, которую
      поставят дегустаторы, чтобы отбраковывать проблемные партии заранее и
      не тратить время экспертов на заведомо слабые образцы. Данные:
      wineQualityReds.csv. Постройте решение.
    evaluator_notes: |
      Целевая переменная quality — целое число 0-10, но по факту
      сосредоточено в узком диапазоне (5-6 большинство). Намеренно не
      сказано, регрессия это или классификация — интересно посмотреть, как
      пользователь сам это решит и обоснует (оба подхода защитимы). Смотреть
      на осознанность выбора, а не на "единственно верный" ответ.

  - id: income-targeting
    title: "Таргетирование премиальных предложений"
    difficulty: advanced
    related_topics: [classification-metrics, explainable-ai]
    dataset:
      - "content/ml_basics_course/datasets/adult_census_income.csv"
    brief: |
      Отдел маркетинга премиальной карты хочет находить людей с доходом
      выше 50K среди анкетных данных (доступны из внешних источников), чтобы
      предлагать им премиальный продукт. Данные: adult_census_income.csv.
      Постройте решение и подготовьте короткое резюме для менеджера, который
      будет защищать его перед юридическим отделом компании.
    evaluator_notes: |
      Классификация (salary >50K/<=50K). Это этически чувствительный кейс:
      в данных есть race и sex. Ключевая проверка — заметил ли пользователь
      сам (без подсказки) риск использования этих признаков для
      маркетингового таргетинга, и как аргументировал решение
      включить/исключить их. Если пользователь не поднял эту тему вообще —
      это главный пункт фидбека, даже если модель технически хороша.

  - id: onion-price-forecast
    title: "Прогноз цены на лук для оптового закупщика"
    difficulty: advanced
    related_topics: [time-series, linear-regression-gd]
    dataset:
      - "content/ml_basics_course/datasets/Indian_Onion_Market_Arrivals.csv"
    brief: |
      Оптовый закупщик хочет заранее понимать, вырастет или упадёт цена на
      лук в ближайший месяц на конкретном рынке, чтобы решить — закупать
      партию сейчас или подождать. Данные о поставках и ценах по рынкам:
      Indian_Onion_Market_Arrivals.csv. Постройте решение.
    evaluator_notes: |
      По сути временной ряд с разбивкой по market/state/city. Ключевая
      проверка: не сделал ли пользователь классическую ошибку случайного
      train/test сплита на временных данных (утечка будущего в прошлое) —
      для честной оценки нужен сплит по времени. Оценить, учёл ли
      пользователь сезонность/тренд, а не просто закинул дату как число в
      обычную регрессию.

  - id: crime-resource-allocation
    title: "Распределение социальных программ по районам"
    difficulty: advanced
    related_topics: [linear-regression-gd, explainable-ai]
    dataset:
      - "content/ml_basics_course/datasets/crimedata.csv"
    brief: |
      Городская администрация хочет распределить дополнительное
      финансирование социальных программ по районам с наибольшим ожидаемым
      ростом преступности, используя демографические и социально-
      экономические данные по районам. Данные: crimedata.csv. Постройте
      решение и подготовьте короткое резюме для администрации.
    evaluator_notes: |
      Регрессия (целевая переменная про уровень преступности в датасете).
      Это ЖЁСТКО этически чувствительный кейс: датасет содержит доли
      населения по расе (racepctblack, racePctWhite и т.д.) как признаки, и
      решение напрямую влияет на распределение бюджета на районы — реальный
      сценарий предвзятого policing/ресурсного распределения. Главная
      проверка: поднял ли пользователь этот вопрос сам, не воспользовался ли
      расовыми признаками бездумно как "просто ещё одна фича". Если нет —
      это должно быть первым пунктом фидбека независимо от технического
      качества решения.

  - id: diabetes-risk-screening
    title: "Скрининг риска диабета на плановом осмотре"
    difficulty: intermediate
    related_topics: [classification-metrics, class-imbalance]
    dataset:
      - "content/ml_basics_course/datasets/diabetes.csv"
    brief: |
      Поликлиника хочет по результатам стандартных анализов на плановом
      осмотре выделять пациентов с повышенным риском диабета для
      дополнительного обследования. Пропустить пациента с реальным риском
      значительно хуже, чем направить здорового человека на лишний анализ.
      Данные: diabetes.csv. Постройте решение и обоснуйте выбор.
    evaluator_notes: |
      Классификация. Костная асимметрия здесь ЗЕРКАЛЬНА кейсу loan-approval
      (там важнее precision, здесь — recall). Специально даю оба кейса,
      чтобы проверить, что пользователь выбирает метрику по обоснованию
      бизнес-цены ошибки каждый раз заново, а не по шаблону "у меня всегда
      так".

# Кейсы, требующие внешних данных (не включены в основную ротацию, но можно
# запросить явно) — bonus-ноутбуки репозитория используют данные, которых
# нет в submodule:
#  - Прогнозирование оттока клиентов: требует BankChurners.csv с Kaggle
#    (ручная скачка, есть ссылка внутри ноутбука).
#  - Предсказание отклика клиента: тянет ifood_df_raw.csv с
#    https://github.com/evgpat/datasets — доступно по прямой ссылке.
