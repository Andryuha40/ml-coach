    notes: "content/notes/decision-trees.md"
    homework_notes: "content/notes/decision-trees-homework.md"
    concepts:
      - "узлы, корень, листья, глубина дерева, предикаты"
      - "критерий информативности: Джини, энтропия"
      - "переобучение дерева, критерии остановки, стрижка (pruning)"
      - "bias-variance tradeoff на примере дерева"

  - id: ensembles-bagging-boosting
    title: "Ансамбли: бэггинг, случайный лес, стекинг, бустинг"
    level: intermediate
    prereqs: [decision-trees]
    sources:
      lecture:
        - "content/lectures/Лекции__15. Запись лекций_16 мая 2026.txt"
        - "content/lectures/Лекции__17. Запись лекций_30 мая 2026.txt"
      seminar_transcript:
        - "content/seminars/Семинары__15. Запись семинара_2 поток_20 мая_2026.txt"
      repo_lesson:
        - "content/ml_basics_course/lesson_09/09. Лекция. Ансамблевые методы.pdf"
        - "content/ml_basics_course/lesson_09/09_Семинар_Ансамблевые_методы.ipynb"
        - "content/ml_basics_course/lesson_10/10. Градиентный бустинг.pdf"
        - "content/ml_basics_course/lesson_10/10. Семинар. Бустинги с подбором гиперпараметров.ipynb"
      homework:
        - "content/ml_basics_course/homeworks/homework 4 (Trees and Ensembles)/homework_4_trees_and_ensembles.ipynb"
    notes: "content/notes/ensembles-bagging-boosting.md"
    homework_notes: "content/notes/ensembles-bagging-boosting-homework.md"
    concepts:
      - "бэггинг, бутстрап, out-of-bag ошибка"
      - "случайный лес"
      - "стекинг"
      - "бустинг (общая идея), XGBoost / CatBoost / LightGBM — чем отличаются"

  - id: class-imbalance
    title: "Дисбаланс классов"
    level: intermediate
    prereqs: [classification-metrics]
    sources:
      seminar_transcript:
        - "content/seminars/Семинары__14. Запись семинара_2 поток_13 мая_2026.txt"
        - "content/seminars/Семинары__17. Запись семинара_2 поток_3 июня_2026.txt"
    notes: "content/notes/class-imbalance.md"
    concepts:
      - "почему дисбаланс классов ломает наивную оценку качества"
      - "методы борьбы: взвешивание классов (class_weight), передискретизация"
      - "ансамбли + андерсэмплинг (Balanced Random Forest)"

  # ---------- Модуль 4: признаки, NLP и интерпретируемость ----------

  - id: feature-selection-dim-reduction
    title: "Отбор признаков и понижение размерности (PCA)"
    level: intermediate
    prereqs: [linear-regression-gd]
    sources:
      lecture:
        - "content/lectures/Лекции__17. Запись лекций_30 мая 2026.txt"
      seminar_transcript:
        - "content/seminars/Семинары__17. Запись семинара_2 поток_3 июня_2026.txt"
