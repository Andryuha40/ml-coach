      - "мешок слов и TF-IDF (повторение и практика)"
      - "классификация эмоций/тональности текста"

  - id: explainable-ai
    title: "Интерпретируемость и объяснимость моделей (XAI)"
    level: advanced
    prereqs: [decision-trees, ensembles-bagging-boosting]
    sources:
