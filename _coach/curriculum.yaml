# Карта курса для /coach.
#
# Источники объединены из трёх мест, все пути — относительно корня репозитория:
#  - content/lectures/  — PDF-слайды лекций 01,02,03,04,05,07,09,10 (без устного
#    транскрипта) и текстовые транскрипты лекций 11-19 (анонимизированы —
#    имена участников обсуждений удалены/обезличены перед публикацией)
#  - content/seminars/  — ноутбуки семинаров (тем 01-10) и текстовые транскрипты
#    семинаров "2 поток" (темы начиная с кросс-валидации, недели 10-18),
#    тоже анонимизированы
#  - content/ml_basics_course/ — git submodule на публичный репозиторий
#    https://github.com/evgpat/ml_basics_course (Евгений Паточенко, MIT license):
#    PDF-презентации на каждый lesson_NN и банк homeworks/ с задачами
#    basic/adv уровня
#
# Важное наблюдение: этот курс (лекции 11-19) не идёт строго по программе
# репозитория — он ведёт две параллельные линии: (a) классический ML почти
# вплотную по программе репозитория (SVM, kNN, деревья, ансамбли, бустинг,
# отбор признаков, кластеризация, временные ряды) и (b) отдельный блок про
# LLM/агентов/RAG/трансформеры, которого в репозитории нет вообще.
#
# Схема источников на тему:
#   lecture             — PDF-слайды (01-10) или транскрипты (11-19) из content/lectures/
#   seminar_notebook     — ноутбуки из content/seminars/
#   seminar_transcript   — транскрипты семинаров из content/seminars/
#   repo_lesson           — файлы из content/ml_basics_course/lesson_NN/
#   homework               — ноутбуки из content/ml_basics_course/homeworks/

topics:
  # ---------- Модуль 1: основы ----------

  - id: intro-ai-ml
    title: "Введение в ИИ и машинное обучение"
    level: beginner
    prereqs: []
    sources:
      lecture:
        - "content/lectures/01. Лекция. Искусственный интеллект.pdf"
        - "content/lectures/02. Лекция. Введение в машинное обучение.pdf"
      seminar_notebook:
        - "content/seminars/02_Семинар_Введение_в_машинное_обучение.ipynb"
      repo_lesson:
        - "content/ml_basics_course/lesson_01/01. Лекция. Введение в машинное обучение.pdf"
        - "content/ml_basics_course/lesson_01/01. Семинар. Разведочный анализ данных.ipynb"
    notes: "content/notes/intro-ai-ml.md"
    concepts:
      - "объект, признаковое описание, типы признаков"
      - "модель как семейство функций, функция потерь"
      - "train/test split, зачем нужна тестовая выборка"
      - "интерфейс sklearn: fit/predict, accuracy_score"

  - id: linear-regression-gd
    title: "Линейные методы регрессии, градиентный спуск, регуляризация"
    level: beginner
    prereqs: [intro-ai-ml]
    sources:
      lecture:
        - "content/lectures/03. Лекция. Линейные методы регрессии.pdf"
        - "content/lectures/04. Лекция. Градиентный спуск.pdf"
        - "content/lectures/05. Лекция. Базовые методы обучения моделей.pdf"
      seminar_notebook:
        - "content/seminars/06_Семинар_Обучение_линейной_регрессии.ipynb"
      repo_lesson:
        - "content/ml_basics_course/lesson_02/02. Лекция. Линейные методы регрессии. Функционал ошибки. Метрики качества. Переобучение.pdf"
        - "content/ml_basics_course/lesson_02/02. Семинар. Задача предсказания стоимости квартиры в Москве и Московской области.ipynb"
        - "content/ml_basics_course/lesson_03/03. Лекция. Часть 2. Градиентный спуск.pdf"
        - "content/ml_basics_course/lesson_03/Градиентный_спуск_вариации.ipynb"
        - "content/ml_basics_course/lesson_04/04. Лекция. Регуляризация в линейной регрессии. Кросс-валидация. Кодирование категориальных признаков_upd.pdf"
      homework:
        - "content/ml_basics_course/homeworks/homework 2 (Linear Regression)/homework_2_linear_regression_(basic).ipynb"
        - "content/ml_basics_course/homeworks/bonus homework (Gradient Descent)/homework_02_bonus_gradient_descent.ipynb"
    notes: "content/notes/linear-regression-gd.md"
    concepts:
      - "линейная модель, MSE как функция потерь"
      - "аналитическое решение vs градиентный спуск"
      - "learning rate, сходимость, локальные минимумы"
      - "регуляризация: L2 (Ridge), L1 (Lasso), ElasticNet — формулы и чем отличаются"
      - "переобучение vs недообучение"

  - id: text-features
    title: "Работа с текстовыми данными и эмбеддинги (базовый уровень)"
    level: beginner
    prereqs: [intro-ai-ml]
    sources:
      seminar_notebook:
        - "content/seminars/03_Семинар_Эмбеддинги_для_текста.ipynb"
        - "content/seminars/04_Семинар_Преобразование_текстовых_данных.ipynb"
    notes: "content/notes/text-features.md"
    concepts:
      - "bag of words, TF-IDF"
      - "векторные представления (эмбеддинги) текста"
      - "базовая предобработка текста"

  - id: eda-and-pipeline
    title: "Разведочный анализ данных, sklearn Pipeline, кодирование признаков"
    level: beginner
    prereqs: [linear-regression-gd]
    sources:
      lecture:
        - "content/lectures/07. Лекция. Класс Pipeline.pdf"
      seminar_notebook:
        - "content/seminars/05_Семинар_Разведочный_анализ_данных.ipynb"
        - "content/seminars/07_Класс_Pipeline.ipynb"
      repo_lesson:
        - "content/ml_basics_course/lesson_01/01. Семинар. Разведочный анализ данных (Sweetviz).ipynb"
        - "content/ml_basics_course/lesson_04/04_Семинар_Регуляризация_в_линейной_регрессии,_кросс_валидация,_кодирование_категориальных_признаков.ipynb"
        - "content/ml_basics_course/lesson_04/Ноутбук-подсказка. Конструирование_признаков.ipynb"
      homework:
        - "content/ml_basics_course/homeworks/homework 1 (Pandas and EDA)/homework_01_(basic).ipynb"
    notes: "content/notes/eda-and-pipeline.md"
    homework_notes: "content/notes/eda-and-pipeline-homework.md"
    concepts:
      - "EDA: пропуски, выбросы, распределения признаков"
      - "зачем нужен Pipeline, ColumnTransformer"
      - "утечка данных (data leakage) при неправильном препроцессинге"
      - "кодирование категориальных признаков"

  - id: classification-metrics
    title: "Линейные методы классификации и метрики качества"
    level: beginner
    prereqs: [linear-regression-gd]
    sources:
      lecture:
        - "content/lectures/09. Лекция. Линейные методы классификации.pdf"
        - "content/lectures/10. Лекция. Метрики качества классификации.pdf"
      repo_lesson:
        - "content/ml_basics_course/lesson_05/05. Линейные методы классификации.pdf"
        - "content/ml_basics_course/lesson_05/05. Семинар. Бинарная классификация, логистическая регрессия.ipynb"
        - "content/ml_basics_course/lesson_05/Классификация (предсказания отклика клиента на маркетинговую кампанию).ipynb"
      homework:
        - "content/ml_basics_course/homeworks/homework 3 (Classification)/homework_3_classification_(basic).ipynb"
    notes: "content/notes/classification-metrics.md"
    homework_notes: "content/notes/classification-metrics-homework.md"
    concepts:
      - "логистическая регрессия, sigmoid, решающее правило"
      - "precision, recall, F1, confusion matrix"
      - "ROC-AUC, дисбаланс классов"

  # ---------- Модуль 2: валидация, метрические и опорные методы ----------

  - id: cross-validation-hyperparams
    title: "Кросс-валидация и подбор гиперпараметров"
    level: intermediate
    prereqs: [classification-metrics]
    sources:
      lecture:
        - "content/lectures/05. Лекция. Базовые методы обучения моделей.pdf"
      seminar_transcript:
        - "content/seminars/Семинары__10. Запись семинара_2 поток_8 апреля_2026.txt"
    notes: "content/notes/cross-validation-hyperparams.md"
    concepts:
      - "обобщающая способность, зачем нужна кросс-валидация"
      - "train/validation/test — зачем нужна третья часть при подборе гиперпараметров"
      - "k-Fold CV, Stratified k-Fold, Leave-One-Out"
      - "зависимость качества модели от объёма данных"
      - "Grid Search vs Random Search vs Successive Halving vs байесовская оптимизация"

  - id: svm
    title: "Метод опорных векторов (SVM)"
    level: intermediate
    prereqs: [classification-metrics]
    sources:
      seminar_transcript:
        - "content/seminars/Семинары__11. Запись семинара_2 поток_15 апреля_2026.txt"
      repo_lesson:
        - "content/ml_basics_course/lesson_06/06. Лекция. SVM. Многоклассовая классификация.pdf"
        - "content/ml_basics_course/lesson_06/06_Семинар_Многоклассовая_классификация.ipynb"
        - "content/ml_basics_course/lesson_07/07. Семинар. Сравнение классификаторов (визуализация разделяющих границ).ipynb"
    notes: "content/notes/svm.md"
    concepts:
      - "отступ (margin), опорные векторы"
      - "hard margin vs soft margin, параметр C"
      - "hinge loss"
      - "kernel trick для линейно неразделимых данных"

  - id: knn
    title: "Метод k ближайших соседей (kNN) и приближённый поиск соседей"
    level: intermediate
    prereqs: [classification-metrics]
    sources:
      seminar_transcript:
        - "content/seminars/Семинары__12. Запись семинара_2 поток_22 апреля_2026.txt"
        - "content/seminars/Семинары__13. Запись семинара_2 поток_29 апреля_2026.txt"
      repo_lesson:
        - "content/ml_basics_course/lesson_07/07. Нелинейные методы классификации.pdf"
        - "content/ml_basics_course/lesson_07/07. Семинар. Метод kNN.ipynb"
    notes: "content/notes/knn.md"
    concepts:
      - "гипотеза компактности, метрики расстояния, масштабирование признаков"
      - "взвешенный kNN, метод парзеновского окна"
      - "вычислительная сложность kNN"
      - "LSH: случайные проекции, MinHash, мера Жаккара (приближённый поиск соседей)"

  # ---------- Модуль 3: деревья и ансамбли ----------

  - id: decision-trees
    title: "Решающие деревья"
    level: intermediate
    prereqs: [classification-metrics]
    sources:
