      - "permutation importance, the Boruta algorithm"
      - "principal component analysis (PCA) and SVD"
      - "multidimensional scaling (MDS), t-SNE — for visualization, not as model features"

  - id: nlp-text-classification
    title: "Text processing and text classification (NLP)"
    level: intermediate
