    notes: "content/notes-en/cross-validation-hyperparams.md"
    concepts:
      - "generalization ability, why cross-validation is needed"
      - "train/validation/test — why a third split is needed for hyperparameter tuning"
      - "k-Fold CV, Stratified k-Fold, Leave-One-Out"
      - "how model quality depends on data volume"
      - "Grid Search vs. Random Search vs. Successive Halving vs. Bayesian optimization"

