        - "content/ml_basics_course/lesson_07/07. Семинар. Метод kNN.ipynb"
    notes: "content/notes-en/knn.md"
    concepts:
      - "the compactness hypothesis, distance metrics, feature scaling"
      - "weighted kNN, the Parzen window method"
      - "computational complexity of kNN"
      - "LSH: random projections, MinHash, the Jaccard measure (approximate neighbor search)"

