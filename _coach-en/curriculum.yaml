    notes: "content/notes-en/eda-and-pipeline.md"
    homework_notes: "content/notes-en/eda-and-pipeline-homework.md"
    concepts:
      - "EDA: missing values, outliers, feature distributions"
      - "why Pipeline and ColumnTransformer are needed"
      - "data leakage from incorrect preprocessing"
      - "encoding categorical features"

  - id: classification-metrics
    title: "Linear classification methods and quality metrics"
    level: beginner
    prereqs: [linear-regression-gd]
    sources:
