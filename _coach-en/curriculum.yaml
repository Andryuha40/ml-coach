# Course map for /coach (English-language version).
#
# Sources are merged from three places; all paths are relative to the
# repository root. The source files themselves (lecture PDFs, seminar
# notebooks/transcripts) are the original course materials and remain in
# Russian — they are not translated. Only the topic map itself (titles,
# concepts, comments) and the consolidated notes (content/notes-en/) are in
# English.
#  - content/lectures/  — lecture slide PDFs 01,02,03,04,05,07,09,10 (no
#    spoken transcript) and text transcripts of lectures 11-19
#    (anonymized — mentions of specific participants removed/anonymized
#    before publication)
#  - content/seminars/  — seminar notebooks (topics 01-10) and text
#    transcripts of the "2nd cohort" seminars (topics starting from
#    cross-validation, weeks 10-18), also anonymized
#  - content/ml_basics_course/ — a git submodule pointing at the public
#    repository https://github.com/evgpat/ml_basics_course (Evgeny
#    Patochenko, MIT license): PDF slides for each lesson_NN and a bank of
#    homeworks/ with basic/adv-level problems
#
# Important note: this course (lectures 11-19) doesn't follow the
# repository's syllabus exactly — it runs two parallel tracks: (a) classic
# ML, closely following the repository's syllabus (SVM, kNN, trees,
# ensembles, boosting, feature selection, clustering, time series), and
# (b) a separate block on LLMs/agents/RAG/transformers, which the
# repository doesn't cover at all.
#
# Source scheme per topic:
#   lecture             — slide PDFs (01-10) or transcripts (11-19) from content/lectures/
#   seminar_notebook     — notebooks from content/seminars/
#   seminar_transcript   — seminar transcripts from content/seminars/
#   repo_lesson           — files from content/ml_basics_course/lesson_NN/
#   homework               — notebooks from content/ml_basics_course/homeworks/

topics:
  # ---------- Module 1: fundamentals ----------

  - id: intro-ai-ml
    title: "Introduction to AI and machine learning"
    level: beginner
    prereqs: []
    sources:
      lecture:
        - "content/lectures/01. Лекция. Искусственный интеллект.pdf"
        - "content/lectures/02. Лекция. Введение в машинное обучение.pdf"
      seminar_notebook:
        - "content/seminars/02_Семинар_Введение_в_машинное_обучение.ipynb"
      repo_lesson:
        - "content/ml_basics_course/lesson_01/01. Лекция. Введение в машинное обучение.pdf"
        - "content/ml_basics_course/lesson_01/01. Семинар. Разведочный анализ данных.ipynb"
    notes: "content/notes-en/intro-ai-ml.md"
    concepts:
      - "an object, feature representation, feature types"
      - "a model as a family of functions, the loss function"
      - "train/test split, why a test set is needed"
      - "the sklearn interface: fit/predict, accuracy_score"

  - id: linear-regression-gd
    title: "Linear regression, gradient descent, regularization"
    level: beginner
    prereqs: [intro-ai-ml]
    sources:
      lecture:
        - "content/lectures/03. Лекция. Линейные методы регрессии.pdf"
        - "content/lectures/04. Лекция. Градиентный спуск.pdf"
        - "content/lectures/05. Лекция. Базовые методы обучения моделей.pdf"
      seminar_notebook:
        - "content/seminars/06_Семинар_Обучение_линейной_регрессии.ipynb"
      repo_lesson:
        - "content/ml_basics_course/lesson_02/02. Лекция. Линейные методы регрессии. Функционал ошибки. Метрики качества. Переобучение.pdf"
        - "content/ml_basics_course/lesson_02/02. Семинар. Задача предсказания стоимости квартиры в Москве и Московской области.ipynb"
        - "content/ml_basics_course/lesson_03/03. Лекция. Часть 2. Градиентный спуск.pdf"
        - "content/ml_basics_course/lesson_03/Градиентный_спуск_вариации.ipynb"
        - "content/ml_basics_course/lesson_04/04. Лекция. Регуляризация в линейной регрессии. Кросс-валидация. Кодирование категориальных признаков_upd.pdf"
      homework:
        - "content/ml_basics_course/homeworks/homework 2 (Linear Regression)/homework_2_linear_regression_(basic).ipynb"
        - "content/ml_basics_course/homeworks/bonus homework (Gradient Descent)/homework_02_bonus_gradient_descent.ipynb"
    notes: "content/notes-en/linear-regression-gd.md"
    concepts:
      - "the linear model, MSE as a loss function"
      - "the analytical solution vs. gradient descent"
      - "learning rate, convergence, local minima"
      - "regularization: L2 (Ridge), L1 (Lasso), ElasticNet — formulas and how they differ"
      - "overfitting vs. underfitting"

  - id: text-features
    title: "Working with text data and embeddings (basic level)"
    level: beginner
