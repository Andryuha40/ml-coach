    notes: "content/notes-en/text-features.md"
    concepts:
      - "bag of words, TF-IDF"
      - "vector representations (embeddings) of text"
      - "basic text preprocessing"

  - id: eda-and-pipeline
    title: "Exploratory data analysis, sklearn Pipeline, feature encoding"
    level: beginner
    prereqs: [linear-regression-gd]
    sources:
      lecture:
        - "content/lectures/07. Лекция. Класс Pipeline.pdf"
      seminar_notebook:
        - "content/seminars/05_Семинар_Разведочный_анализ_данных.ipynb"
        - "content/seminars/07_Класс_Pipeline.ipynb"
